name: CI - E2E - Playwright

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'
      - 'temp-**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') && !contains(github.ref, 'prod-') }}

permissions:
  contents: read

# =============================================================================
# PHASE 2 MIGRATION: Container-based E2E
# =============================================================================
# Once devcontainer images are built and pushed to GHCR, update permissions
# and replace build-client job to use container-based builds for faster CI:
#
# permissions:
#   contents: read
#   packages: read
#
# jobs:
#   build-client:
#     name: Build Client
#     runs-on: ubuntu-24.04
#     container:
#       image: ghcr.io/freecodecamp/devcontainer:latest
#       credentials:
#         username: ${{ github.actor }}
#         password: ${{ secrets.GITHUB_TOKEN }}
#
#     steps:
#       - name: Checkout
#         uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
#         with:
#           submodules: 'recursive'
#
#       - name: Checkout client-config
#         uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
#         with:
#           repository: freeCodeCamp/client-config
#           path: client-config
#
#       - name: Set Environment
#         run: cp sample.env .env
#
#       - name: Build
#         run: pnpm run build
#
#       - name: Move serve.json
#         run: cp client-config/serve.json client/public/serve.json
#
#       - name: Upload Client Artifact
#         uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
#         with:
#           name: client-artifact
#           path: client/public
# =============================================================================

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: 'recursive'

      - name: Checkout client-config
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: freeCodeCamp/client-config
          path: client-config

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: false

      - name: Set Environment
        run: cp sample.env .env

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Move serve.json
        run: cp client-config/serve.json client/public/serve.json

      - name: Upload Client Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: client-artifact
          path: client/public

  build-api:
    name: Build API (Container)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: 'recursive'

      - name: Create Image
        run: docker build -t fcc-api -f docker/api/Dockerfile .

      - name: Save Image
        run: docker save fcc-api > api-artifact.tar

      - name: Upload API Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: api-artifact
          path: api-artifact.tar

  playwright-run:
    name: Playwright Tests
    runs-on: ubuntu-24.04
    needs: [build-client, build-api]
    strategy:
      fail-fast: false
      matrix:
        browsers: [chromium]

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: false

      - name: Download Client Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: client-artifact
          path: client/public

      - name: Download API Artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: api-artifact
          path: api-artifact

      - name: Load API Image
        run: |
          docker load < api-artifact/api-artifact.tar
          rm api-artifact/api-artifact.tar

      - name: Set Environment
        run: cp sample.env .env

      - name: Install Dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start MongoDB
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Start Apps
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.e2e.yml up -d api mailpit
          pnpm run serve:client-ci &
          sleep 10

      - name: Seed Database
        run: pnpm run seed:certified-user

      - name: Run Playwright
        run: pnpm run playwright:run --project=${{ matrix.browsers }} --grep-invert 'third-party-donation.spec.ts'

      - name: Upload Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.browsers }}
          path: playwright/reporter
          retention-days: 7
