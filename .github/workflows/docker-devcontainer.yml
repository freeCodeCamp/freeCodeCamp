name: CD - Docker - Devcontainer Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'pnpm-lock.yaml'
      - 'curriculum/**'
      - 'packages/shared/**'
      - 'docker/devcontainer/**'
      - '.github/workflows/docker-devcontainer.yml'

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: 'recursive'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: docker/devcontainer/Dockerfile
          target: base
          push: true
          tags: |
            ghcr.io/freecodecamp/base:${{ github.sha }}
            ghcr.io/freecodecamp/base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push devcontainer image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: docker/devcontainer/Dockerfile
          target: devcontainer
          push: true
          tags: |
            ghcr.io/freecodecamp/devcontainer:${{ github.sha }}
            ghcr.io/freecodecamp/devcontainer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
